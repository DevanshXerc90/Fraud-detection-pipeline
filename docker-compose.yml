version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  mlflow:
    image: python:3.11-slim
    ports:
      - "5001:5000"  # host 5001 → container 5000 (avoids macOS AirPlay conflict)
    command: >
      bash -c "pip install mlflow &&
              mlflow server
              --host 0.0.0.0
              --port 5000
              --backend-store-uri sqlite:///mlflow.db
              --default-artifact-root ./mlartifacts"
    volumes:
      - mlflow_data:/mlflow
    restart: unless-stopped

volumes:
  mlflow_data: